site_name: metaharness
site_description: Filesystem first harness optimization for agentic coding systems and coding tool users.
site_url: !ENV [MKDOCS_SITE_URL, "https://superagenticai.github.io/metaharness/"]
repo_url: https://github.com/SuperagenticAI/metaharness
repo_name: SuperagenticAI/metaharness
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.action.edit
    - content.action.view
    - content.code.copy
    - search.suggest
    - search.highlight
    - palette.toggle
  font: false
  icon:
    repo: fontawesome/brands/github
extra:
  generator: false
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Providers: providers.md
  - Benchmarks: benchmarks.md
  - Extensions: extensions.md
  - Official Comparison: official-comparison.md
  - Alignment: alignment.md
  - CLI Reference: cli-reference.md
  - Experiments: experiments.md
extra_css:
  - stylesheets/extra.css
